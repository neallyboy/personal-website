<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1318"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>

  <!-- Board shadow -->
  <rect x="58" y="23" width="178" height="178" rx="4" fill="#000" opacity="0.4"/>

  <!-- Tic-tac-toe board -->
  <g transform="translate(60,25)">
    <!-- Grid lines -->
    <line x1="58" y1="4"   x2="58" y2="168" stroke="#4466aa" stroke-width="3" stroke-linecap="round"/>
    <line x1="116" y1="4"  x2="116" y2="168" stroke="#4466aa" stroke-width="3" stroke-linecap="round"/>
    <line x1="4"   y1="58" x2="168" y2="58"  stroke="#4466aa" stroke-width="3" stroke-linecap="round"/>
    <line x1="4"   y1="116" x2="168" y2="116" stroke="#4466aa" stroke-width="3" stroke-linecap="round"/>

    <!-- X marks (player) -->
    <!-- Cell 0,0 -->
    <line x1="14" y1="14" x2="44" y2="44" stroke="#ff6644" stroke-width="4" stroke-linecap="round"/>
    <line x1="44" y1="14" x2="14" y2="44" stroke="#ff6644" stroke-width="4" stroke-linecap="round"/>
    <!-- Cell 1,1 -->
    <line x1="72" y1="72" x2="102" y2="102" stroke="#ff6644" stroke-width="4" stroke-linecap="round"/>
    <line x1="102" y1="72" x2="72" y2="102" stroke="#ff6644" stroke-width="4" stroke-linecap="round"/>
    <!-- Cell 2,2 (winning) -->
    <line x1="130" y1="130" x2="160" y2="160" stroke="#ff6644" stroke-width="4" stroke-linecap="round"/>
    <line x1="160" y1="130" x2="130" y2="160" stroke="#ff6644" stroke-width="4" stroke-linecap="round"/>

    <!-- O marks (Jasper AI) -->
    <!-- Cell 0,1 -->
    <circle cx="87" cy="29" r="16" fill="none" stroke="#44aaff" stroke-width="4"/>
    <!-- Cell 1,0 -->
    <circle cx="29" cy="87" r="16" fill="none" stroke="#44aaff" stroke-width="4"/>
    <!-- Cell 2,0 -->
    <circle cx="29" cy="145" r="16" fill="none" stroke="#44aaff" stroke-width="4"/>

    <!-- Winning diagonal strike -->
    <line x1="8" y1="8" x2="165" y2="165" stroke="#ff6644" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  </g>

  <!-- Right panel -->
  <rect x="252" y="20" width="132" height="200" rx="8" fill="#111820" opacity="0.9"/>
  <text x="318" y="50" font-size="13" font-family="monospace" fill="#88aaff" text-anchor="middle" font-weight="bold">Tic-Tac-Toe</text>
  <line x1="268" y1="58" x2="368" y2="58" stroke="#334" stroke-width="1"/>
  <text x="268" y="78"  font-size="10" font-family="monospace" fill="#556677">vs Jasper AI</text>
  <text x="268" y="94"  font-size="10" font-family="monospace" fill="#556677">3 difficulties</text>
  <text x="268" y="110" font-size="10" font-family="monospace" fill="#556677">Witty banter</text>
  <text x="268" y="145" font-size="10" font-family="monospace" fill="#7788aa">YOU WIN!</text>
  <rect x="268" y="155" width="116" height="22" rx="4" fill="#1a2a4a"/>
  <text x="326" y="170" font-size="10" font-family="monospace" fill="#88aaff" text-anchor="middle" font-weight="bold">▶ PLAY NOW</text>

  <!-- Bottom label -->
  <text x="200" y="235" font-size="11" font-family="monospace" fill="#445566" text-anchor="middle">⭕ Jasper&apos;s Tic-Tac-Toe</text>
</svg>
