<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0a2a"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2a"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>

  <!-- Floor -->
  <rect x="0" y="195" width="400" height="55" fill="url(#floor)"/>
  <line x1="0" y1="195" x2="400" y2="195" stroke="#6600cc" stroke-width="1" opacity="0.6"/>

  <!-- Arena grid lines (perspective) -->
  <line x1="200" y1="195" x2="0"   y2="250" stroke="#330066" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="195" x2="400" y2="250" stroke="#330066" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="195" x2="100" y2="250" stroke="#330066" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="195" x2="300" y2="250" stroke="#330066" stroke-width="1" opacity="0.3"/>

  <!-- Health bars -->
  <rect x="10" y="10" width="140" height="14" rx="2" fill="#1a0a2a"/>
  <rect x="10" y="10" width="110" height="14" rx="2" fill="#00cc44"/>
  <text x="16" y="21" font-size="9" font-family="monospace" fill="#fff" font-weight="bold">JASPER</text>

  <rect x="250" y="10" width="140" height="14" rx="2" fill="#1a0a2a"/>
  <rect x="270" y="10" width="60" height="14" rx="2" fill="#cc2200"/>
  <text x="384" y="21" font-size="9" font-family="monospace" fill="#fff" font-weight="bold" text-anchor="end">DADDY</text>

  <!-- VS label -->
  <text x="200" y="22" font-size="12" font-family="monospace" fill="#cc44ff" text-anchor="middle" font-weight="bold">VS</text>

  <!-- Player robot (Jasper - left, cyan) -->
  <g transform="translate(90,145)">
    <!-- Shadow -->
    <ellipse cx="0" cy="52" rx="22" ry="6" fill="#000" opacity="0.4"/>
    <!-- Body -->
    <rect x="-16" y="-30" width="32" height="36" rx="4" fill="#006688"/>
    <rect x="-14" y="-28" width="28" height="32" rx="3" fill="#0088aa"/>
    <!-- Chest light -->
    <rect x="-6" y="-20" width="12" height="8" rx="2" fill="#00ffff" opacity="0.8" filter="url(#glow)"/>
    <!-- Head -->
    <rect x="-14" y="-52" width="28" height="24" rx="4" fill="#006688"/>
    <rect x="-12" y="-50" width="24" height="20" rx="3" fill="#007799"/>
    <!-- Eyes -->
    <rect x="-9" y="-46" width="6" height="5" rx="1" fill="#00ffff" filter="url(#glow)"/>
    <rect x="3"  y="-46" width="6" height="5" rx="1" fill="#00ffff" filter="url(#glow)"/>
    <!-- Legs -->
    <rect x="-14" y="6"  width="12" height="28" rx="3" fill="#005577"/>
    <rect x="2"   y="6"  width="12" height="28" rx="3" fill="#005577"/>
    <!-- Feet -->
    <rect x="-16" y="32" width="14" height="8" rx="2" fill="#004466"/>
    <rect x="2"   y="32" width="14" height="8" rx="2" fill="#004466"/>
    <!-- Punch arm (extended right) -->
    <rect x="16" y="-22" width="38" height="10" rx="3" fill="#005577"/>
    <rect x="54" y="-26" width="12" height="18" rx="3" fill="#004466"/>
    <!-- Back arm -->
    <rect x="-28" y="-22" width="14" height="10" rx="3" fill="#005577"/>
  </g>

  <!-- Impact flash -->
  <circle cx="188" cy="123" r="18" fill="#ffff44" opacity="0.6" filter="url(#glow2)"/>
  <text x="188" y="128" font-size="14" font-family="monospace" fill="#fff" text-anchor="middle" font-weight="bold">POW!</text>

  <!-- AI robot (Daddy - right, red) -->
  <g transform="translate(290,145)">
    <!-- Shadow -->
    <ellipse cx="0" cy="52" rx="22" ry="6" fill="#000" opacity="0.4"/>
    <!-- Body -->
    <rect x="-16" y="-30" width="32" height="36" rx="4" fill="#880022"/>
    <rect x="-14" y="-28" width="28" height="32" rx="3" fill="#aa0033"/>
    <!-- Chest light -->
    <rect x="-6" y="-20" width="12" height="8" rx="2" fill="#ff4444" opacity="0.8" filter="url(#glow)"/>
    <!-- Head tilted (hit) -->
    <g transform="rotate(15)">
      <rect x="-14" y="-52" width="28" height="24" rx="4" fill="#880022"/>
      <rect x="-12" y="-50" width="24" height="20" rx="3" fill="#aa0033"/>
      <!-- Eyes (dazed) -->
      <text x="-6" y="-39" font-size="10" fill="#ffaaaa">×</text>
      <text x="2"  y="-39" font-size="10" fill="#ffaaaa">×</text>
    </g>
    <!-- Legs -->
    <rect x="-14" y="6"  width="12" height="28" rx="3" fill="#770011"/>
    <rect x="2"   y="6"  width="12" height="28" rx="3" fill="#770011"/>
    <!-- Feet -->
    <rect x="-16" y="32" width="14" height="8" rx="2" fill="#660011"/>
    <rect x="2"   y="32" width="14" height="8" rx="2" fill="#660011"/>
    <!-- Arms (recoiling) -->
    <rect x="-30" y="-18" width="16" height="10" rx="3" fill="#770011"/>
    <rect x="16"  y="-18" width="16" height="10" rx="3" fill="#770011"/>
  </g>

  <!-- Round indicator -->
  <text x="200" y="45" font-size="9" font-family="monospace" fill="#aa66ff" text-anchor="middle">ROUND 2 OF 3</text>
  <text x="200" y="58" font-size="8" font-family="monospace" fill="#7755aa" text-anchor="middle">JASPER LEADS 1-0</text>

  <!-- Bottom label -->
  <text x="200" y="237" font-size="11" font-family="monospace" fill="#445566" text-anchor="middle">🤖 Robot Brawl</text>
</svg>
