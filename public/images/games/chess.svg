<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1318"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>

  <!-- Board shadow -->
  <rect x="68" y="23" width="168" height="168" rx="3" fill="#000" opacity="0.5"/>

  <!-- Chess board (8x8, showing 4 cols x 5 rows cropped) -->
  <g transform="translate(70,25)">
    <!-- Row 0 -->
    <rect x="0"   y="0"   width="20" height="20" fill="#b8a878"/>
    <rect x="20"  y="0"   width="20" height="20" fill="#6b4c2a"/>
    <rect x="40"  y="0"   width="20" height="20" fill="#b8a878"/>
    <rect x="60"  y="0"   width="20" height="20" fill="#6b4c2a"/>
    <rect x="80"  y="0"   width="20" height="20" fill="#b8a878"/>
    <rect x="100" y="0"   width="20" height="20" fill="#6b4c2a"/>
    <rect x="120" y="0"   width="20" height="20" fill="#b8a878"/>
    <rect x="140" y="0"   width="20" height="20" fill="#6b4c2a"/>
    <!-- Row 1 -->
    <rect x="0"   y="20"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="20"  y="20"  width="20" height="20" fill="#b8a878"/>
    <rect x="40"  y="20"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="60"  y="20"  width="20" height="20" fill="#b8a878"/>
    <rect x="80"  y="20"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="100" y="20"  width="20" height="20" fill="#b8a878"/>
    <rect x="120" y="20"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="140" y="20"  width="20" height="20" fill="#b8a878"/>
    <!-- Row 2 -->
    <rect x="0"   y="40"  width="20" height="20" fill="#b8a878"/>
    <rect x="20"  y="40"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="40"  y="40"  width="20" height="20" fill="#b8a878"/>
    <rect x="60"  y="40"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="80"  y="40"  width="20" height="20" fill="#b8a878"/>
    <rect x="100" y="40"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="120" y="40"  width="20" height="20" fill="#b8a878"/>
    <rect x="140" y="40"  width="20" height="20" fill="#6b4c2a"/>
    <!-- Row 3 -->
    <rect x="0"   y="60"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="20"  y="60"  width="20" height="20" fill="#b8a878"/>
    <rect x="40"  y="60"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="60"  y="60"  width="20" height="20" fill="#b8a878"/>
    <rect x="80"  y="60"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="100" y="60"  width="20" height="20" fill="#b8a878"/>
    <rect x="120" y="60"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="140" y="60"  width="20" height="20" fill="#b8a878"/>
    <!-- Row 4 -->
    <rect x="0"   y="80"  width="20" height="20" fill="#b8a878"/>
    <rect x="20"  y="80"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="40"  y="80"  width="20" height="20" fill="#b8a878"/>
    <rect x="60"  y="80"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="80"  y="80"  width="20" height="20" fill="#b8a878"/>
    <rect x="100" y="80"  width="20" height="20" fill="#6b4c2a"/>
    <rect x="120" y="80"  width="20" height="20" fill="#b8a878"/>
    <rect x="140" y="80"  width="20" height="20" fill="#6b4c2a"/>
    <!-- Row 5 -->
    <rect x="0"   y="100" width="20" height="20" fill="#6b4c2a"/>
    <rect x="20"  y="100" width="20" height="20" fill="#b8a878"/>
    <rect x="40"  y="100" width="20" height="20" fill="#6b4c2a"/>
    <rect x="60"  y="100" width="20" height="20" fill="#b8a878"/>
    <rect x="80"  y="100" width="20" height="20" fill="#6b4c2a"/>
    <rect x="100" y="100" width="20" height="20" fill="#b8a878"/>
    <rect x="120" y="100" width="20" height="20" fill="#6b4c2a"/>
    <rect x="140" y="100" width="20" height="20" fill="#b8a878"/>
    <!-- Row 6 -->
    <rect x="0"   y="120" width="20" height="20" fill="#b8a878"/>
    <rect x="20"  y="120" width="20" height="20" fill="#6b4c2a"/>
    <rect x="40"  y="120" width="20" height="20" fill="#b8a878"/>
    <rect x="60"  y="120" width="20" height="20" fill="#6b4c2a"/>
    <rect x="80"  y="120" width="20" height="20" fill="#b8a878"/>
    <rect x="100" y="120" width="20" height="20" fill="#6b4c2a"/>
    <rect x="120" y="120" width="20" height="20" fill="#b8a878"/>
    <rect x="140" y="120" width="20" height="20" fill="#6b4c2a"/>
    <!-- Row 7 -->
    <rect x="0"   y="140" width="20" height="20" fill="#6b4c2a"/>
    <rect x="20"  y="140" width="20" height="20" fill="#b8a878"/>
    <rect x="40"  y="140" width="20" height="20" fill="#6b4c2a"/>
    <rect x="60"  y="140" width="20" height="20" fill="#b8a878"/>
    <rect x="80"  y="140" width="20" height="20" fill="#6b4c2a"/>
    <rect x="100" y="140" width="20" height="20" fill="#b8a878"/>
    <rect x="120" y="140" width="20" height="20" fill="#6b4c2a"/>
    <rect x="140" y="140" width="20" height="20" fill="#b8a878"/>

    <!-- Pieces: black rook e8 -->
    <text x="82" y="15" font-size="16" text-anchor="middle" fill="#1a1a1a" font-family="serif">♜</text>
    <!-- black queen d8 -->
    <text x="62" y="15" font-size="16" text-anchor="middle" fill="#1a1a1a" font-family="serif">♛</text>
    <!-- black king e7 -->
    <text x="82" y="35" font-size="15" text-anchor="middle" fill="#1a1a1a" font-family="serif">♚</text>
    <!-- black pawns -->
    <text x="2"  y="55" font-size="13" text-anchor="middle" fill="#1a1a1a" font-family="serif">♟</text>
    <text x="22" y="55" font-size="13" text-anchor="middle" fill="#1a1a1a" font-family="serif">♟</text>
    <text x="42" y="55" font-size="13" text-anchor="middle" fill="#1a1a1a" font-family="serif">♟</text>
    <text x="62" y="55" font-size="13" text-anchor="middle" fill="#1a1a1a" font-family="serif">♟</text>
    <text x="102" y="55" font-size="13" text-anchor="middle" fill="#1a1a1a" font-family="serif">♟</text>
    <!-- White pieces -->
    <text x="82" y="155" font-size="16" text-anchor="middle" fill="#f0e8d0" font-family="serif">♖</text>
    <text x="62" y="155" font-size="16" text-anchor="middle" fill="#f0e8d0" font-family="serif">♕</text>
    <text x="42" y="155" font-size="16" text-anchor="middle" fill="#f0e8d0" font-family="serif">♗</text>
    <text x="22" y="155" font-size="16" text-anchor="middle" fill="#f0e8d0" font-family="serif">♘</text>
    <text x="2"  y="155" font-size="16" text-anchor="middle" fill="#f0e8d0" font-family="serif">♔</text>
    <!-- White pawns -->
    <text x="2"  y="135" font-size="13" text-anchor="middle" fill="#f0e8d0" font-family="serif">♙</text>
    <text x="22" y="135" font-size="13" text-anchor="middle" fill="#f0e8d0" font-family="serif">♙</text>
    <text x="42" y="135" font-size="13" text-anchor="middle" fill="#f0e8d0" font-family="serif">♙</text>
    <text x="82" y="135" font-size="13" text-anchor="middle" fill="#f0e8d0" font-family="serif">♙</text>
    <text x="102" y="135" font-size="13" text-anchor="middle" fill="#f0e8d0" font-family="serif">♙</text>
    <text x="122" y="135" font-size="13" text-anchor="middle" fill="#f0e8d0" font-family="serif">♙</text>
    <text x="142" y="135" font-size="13" text-anchor="middle" fill="#f0e8d0" font-family="serif">♙</text>
    <!-- Highlight square -->
    <rect x="60" y="60" width="20" height="20" fill="#aacc44" opacity="0.5"/>
  </g>

  <!-- Board border -->
  <rect x="70" y="25" width="160" height="160" rx="2" fill="none" stroke="#8a6a3a" stroke-width="2"/>

  <!-- Right side: text panel -->
  <rect x="252" y="20" width="132" height="200" rx="8" fill="#111820" opacity="0.9"/>
  <text x="318" y="50" font-size="13" font-family="monospace" fill="#aabb88" text-anchor="middle" font-weight="bold">AI Chess</text>
  <line x1="268" y1="58" x2="368" y2="58" stroke="#334" stroke-width="1"/>
  <text x="268" y="78"  font-size="10" font-family="monospace" fill="#556677">Minimax engine</text>
  <text x="268" y="94"  font-size="10" font-family="monospace" fill="#556677">Alpha-beta pruning</text>
  <text x="268" y="110" font-size="10" font-family="monospace" fill="#556677">You play White ♙</text>
  <text x="268" y="145" font-size="10" font-family="monospace" fill="#7788aa">WHITE to move</text>
  <rect x="268" y="155" width="116" height="22" rx="4" fill="#2a4a2a"/>
  <text x="326" y="170" font-size="10" font-family="monospace" fill="#88cc88" text-anchor="middle" font-weight="bold">▶ PLAY NOW</text>

  <!-- Bottom label -->
  <text x="200" y="235" font-size="11" font-family="monospace" fill="#445566" text-anchor="middle">♟ Julien&apos;s AI Chess</text>
</svg>
