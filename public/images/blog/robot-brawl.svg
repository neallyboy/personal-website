<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#08051a"/>
      <stop offset="65%"  stop-color="#1a0a33"/>
      <stop offset="100%" stop-color="#2a1022"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e0a32"/>
      <stop offset="100%" stop-color="#12061e"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonLine" x="-5%" y="-300%" width="110%" height="700%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- City silhouette -->
  <g fill="#0c0518">
    <rect x="0"   y="235" width="55"  height="110"/>
    <rect x="55"  y="210" width="40"  height="135"/>
    <rect x="95"  y="248" width="35"  height="97"/>
    <rect x="130" y="198" width="60"  height="147"/>
    <rect x="190" y="225" width="50"  height="120"/>
    <rect x="240" y="242" width="38"  height="103"/>
    <rect x="278" y="212" width="55"  height="133"/>
    <rect x="333" y="228" width="45"  height="117"/>
    <rect x="378" y="203" width="65"  height="142"/>
    <rect x="443" y="238" width="40"  height="107"/>
    <rect x="483" y="218" width="52"  height="127"/>
    <rect x="535" y="243" width="37"  height="102"/>
    <rect x="572" y="208" width="60"  height="137"/>
    <rect x="632" y="224" width="50"  height="121"/>
    <rect x="682" y="244" width="42"  height="101"/>
    <rect x="724" y="208" width="76"  height="137"/>
  </g>

  <!-- Building windows (dim amber glow) -->
  <g fill="rgba(255,200,50,0.12)">
    <rect x="7"   y="248" width="4" height="6"/> <rect x="17"  y="248" width="4" height="6"/> <rect x="27"  y="248" width="4" height="6"/>
    <rect x="7"   y="263" width="4" height="6"/> <rect x="27"  y="263" width="4" height="6"/>
    <rect x="7"   y="278" width="4" height="6"/> <rect x="17"  y="278" width="4" height="6"/>
    <rect x="62"  y="222" width="4" height="6"/> <rect x="72"  y="222" width="4" height="6"/>
    <rect x="62"  y="237" width="4" height="6"/> <rect x="72"  y="237" width="4" height="6"/>
    <rect x="138" y="210" width="4" height="6"/> <rect x="149" y="210" width="4" height="6"/> <rect x="160" y="210" width="4" height="6"/> <rect x="171" y="210" width="4" height="6"/>
    <rect x="138" y="225" width="4" height="6"/> <rect x="160" y="225" width="4" height="6"/>
    <rect x="149" y="240" width="4" height="6"/> <rect x="171" y="240" width="4" height="6"/>
    <rect x="285" y="224" width="4" height="6"/> <rect x="296" y="224" width="4" height="6"/> <rect x="318" y="224" width="4" height="6"/>
    <rect x="285" y="239" width="4" height="6"/> <rect x="307" y="239" width="4" height="6"/> <rect x="318" y="239" width="4" height="6"/>
    <rect x="385" y="215" width="4" height="6"/> <rect x="396" y="215" width="4" height="6"/> <rect x="418" y="215" width="4" height="6"/>
    <rect x="385" y="230" width="4" height="6"/> <rect x="407" y="230" width="4" height="6"/> <rect x="429" y="230" width="4" height="6"/>
    <rect x="490" y="229" width="4" height="6"/> <rect x="501" y="229" width="4" height="6"/> <rect x="523" y="229" width="4" height="6"/>
    <rect x="490" y="244" width="4" height="6"/> <rect x="512" y="244" width="4" height="6"/>
    <rect x="580" y="220" width="4" height="6"/> <rect x="591" y="220" width="4" height="6"/> <rect x="613" y="220" width="4" height="6"/>
    <rect x="580" y="235" width="4" height="6"/> <rect x="602" y="235" width="4" height="6"/> <rect x="624" y="235" width="4" height="6"/>
    <rect x="731" y="220" width="4" height="6"/> <rect x="742" y="220" width="4" height="6"/> <rect x="764" y="220" width="4" height="6"/>
    <rect x="731" y="235" width="4" height="6"/> <rect x="753" y="235" width="4" height="6"/> <rect x="775" y="235" width="4" height="6"/>
  </g>

  <!-- Floor -->
  <rect x="0" y="345" width="800" height="105" fill="url(#floorGrad)"/>

  <!-- Perspective grid lines -->
  <g stroke="rgba(160,50,220,0.22)" stroke-width="1">
    <line x1="80"  y1="345" x2="-80"  y2="560"/>
    <line x1="160" y1="345" x2="40"   y2="560"/>
    <line x1="240" y1="345" x2="160"  y2="560"/>
    <line x1="320" y1="345" x2="280"  y2="560"/>
    <line x1="400" y1="345" x2="400"  y2="560"/>
    <line x1="480" y1="345" x2="520"  y2="560"/>
    <line x1="560" y1="345" x2="640"  y2="560"/>
    <line x1="640" y1="345" x2="760"  y2="560"/>
    <line x1="720" y1="345" x2="880"  y2="560"/>
  </g>
  <!-- Horizontal floor lines -->
  <g stroke="rgba(160,50,220,0.22)" stroke-width="1">
    <line x1="0" y1="366" x2="800" y2="366"/>
    <line x1="0" y1="388" x2="800" y2="388"/>
    <line x1="0" y1="410" x2="800" y2="410"/>
    <line x1="0" y1="432" x2="800" y2="432"/>
  </g>

  <!-- Neon ground line -->
  <line x1="0" y1="345" x2="800" y2="345" stroke="#aa33ee" stroke-width="6" opacity="0.35"/>
  <line x1="0" y1="345" x2="800" y2="345" stroke="#cc55ff" stroke-width="2" filter="url(#neonLine)"/>

  <!-- ===== HUD ===== -->

  <!-- Player HP bar (JULIEN) -->
  <rect x="20" y="12" width="280" height="20" rx="4" fill="rgba(0,0,0,0.55)"/>
  <rect x="20" y="12" width="280" height="20" rx="4" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <rect x="22" y="14" width="196" height="16" rx="3" fill="#33ee33"/>
  <text x="26" y="26" font-size="13" font-family="'Courier New', monospace" fill="#fff" font-weight="bold">JULIEN</text>
  <!-- Player special cooldown bar -->
  <rect x="20" y="36" width="280" height="5" rx="2" fill="rgba(0,0,0,0.45)"/>
  <rect x="21" y="37" width="238" height="3" rx="1" fill="#99ffaa"/>

  <!-- AI HP bar (DADDY) -->
  <rect x="500" y="12" width="280" height="20" rx="4" fill="rgba(0,0,0,0.55)"/>
  <rect x="500" y="12" width="280" height="20" rx="4" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <rect x="502" y="14" width="82" height="16" rx="3" fill="#ee2222"/>
  <text x="774" y="26" font-size="13" font-family="'Courier New', monospace" fill="#fff" font-weight="bold" text-anchor="end">DADDY</text>
  <!-- AI special cooldown bar -->
  <rect x="500" y="36" width="280" height="5" rx="2" fill="rgba(0,0,0,0.45)"/>
  <rect x="501" y="37" width="112" height="3" rx="1" fill="#ff8844"/>

  <!-- Round win dots: player leads 1-0 -->
  <circle cx="382" cy="22" r="7" fill="#33ff33"/>
  <circle cx="398" cy="22" r="7" fill="rgba(255,255,255,0.15)"/>
  <circle cx="402" cy="22" r="7" fill="rgba(255,255,255,0.15)"/>
  <circle cx="418" cy="22" r="7" fill="rgba(255,255,255,0.15)"/>

  <!-- Timer -->
  <text x="400" y="34" font-size="28" font-family="'Courier New', monospace" fill="#ffffff" font-weight="bold" text-anchor="middle">52</text>

  <!-- ===== IMPACT PARTICLES ===== -->
  <!-- Outer glow burst -->
  <circle cx="410" cy="222" r="38" fill="#ffff44" opacity="0.18" filter="url(#glow2)"/>
  <!-- Core flash -->
  <circle cx="410" cy="222" r="22" fill="#ffff44" opacity="0.55" filter="url(#glow2)"/>
  <circle cx="410" cy="222" r="10" fill="#ffffff" opacity="0.75"/>
  <!-- Radiating particles -->
  <circle cx="380" cy="196" r="6"  fill="#99ffaa" opacity="0.80"/>
  <circle cx="448" cy="200" r="5"  fill="#ff8844" opacity="0.75"/>
  <circle cx="455" cy="245" r="4"  fill="#ffff44" opacity="0.65"/>
  <circle cx="374" cy="248" r="5"  fill="#99ffaa" opacity="0.60"/>
  <circle cx="472" cy="220" r="3"  fill="#ff8844" opacity="0.55"/>
  <circle cx="362" cy="216" r="4"  fill="#ffff44" opacity="0.55"/>
  <circle cx="460" cy="192" r="7"  fill="#ffccaa" opacity="0.60"/>
  <circle cx="395" cy="258" r="4"  fill="#cc55ff" opacity="0.55"/>
  <circle cx="440" cy="262" r="5"  fill="#99ffaa" opacity="0.50"/>
  <circle cx="350" cy="232" r="4"  fill="#ff8844" opacity="0.45"/>
  <circle cx="480" cy="238" r="3"  fill="#ffff44" opacity="0.45"/>
  <circle cx="412" cy="182" r="5"  fill="#ffffff" opacity="0.55"/>
  <circle cx="428" cy="272" r="4"  fill="#cc55ff" opacity="0.45"/>
  <circle cx="338" cy="225" r="3"  fill="#99ffaa" opacity="0.35"/>
  <circle cx="490" cy="208" r="3"  fill="#ffccaa" opacity="0.40"/>
  <circle cx="367" cy="268" r="5"  fill="#ffaaaa" opacity="0.50"/>
  <circle cx="425" cy="178" r="3"  fill="#ffee00" opacity="0.45"/>

  <!-- ===== JULIEN ROBOT (green, facing right, punch pose) ===== -->
  <g transform="translate(228, 267)">
    <!-- Shadow -->
    <ellipse cx="0" cy="78" rx="34" ry="9" fill="#000" opacity="0.40"/>
    <!-- Back leg -->
    <rect x="4"   y="13" width="18" height="42" rx="4" fill="#1a6622"/>
    <rect x="2"   y="54" width="22" height="13" rx="3" fill="#145520"/>
    <!-- Forward leg -->
    <rect x="-21" y="13" width="18" height="42" rx="4" fill="#1a6622"/>
    <rect x="-23" y="54" width="22" height="13" rx="3" fill="#145520"/>
    <!-- Body -->
    <rect x="-24" y="-45" width="48" height="84" rx="6" fill="#228833"/>
    <rect x="-20" y="-41" width="40" height="48" rx="4" fill="#2d9944"/>
    <!-- Reactor core -->
    <circle cx="0" cy="4" r="11" fill="#99ffaa" filter="url(#glow)"/>
    <circle cx="0" cy="4" r="5"  fill="#ffffff"/>
    <!-- Back arm (tucked left) -->
    <rect x="-43" y="-31" width="21" height="14" rx="4" fill="#1a6622"/>
    <!-- Forward punch arm (extended right) -->
    <rect x="24"  y="-32" width="58" height="14" rx="4" fill="#1a6622"/>
    <!-- Fist -->
    <rect x="82"  y="-39" width="18" height="27" rx="4" fill="#145520"/>
    <!-- Head -->
    <rect x="-21" y="-78" width="42" height="36" rx="6" fill="#228833"/>
    <rect x="-18" y="-75" width="36" height="30" rx="4" fill="#2d9944"/>
    <!-- Visor -->
    <rect x="-14" y="-71" width="28" height="13" rx="2" fill="rgba(0,0,0,0.65)"/>
    <!-- Eyes (yellow — Julien) -->
    <rect x="-11" y="-69" width="9" height="8" rx="2" fill="#ffee00" filter="url(#glow)"/>
    <rect x="3"   y="-69" width="9" height="8" rx="2" fill="#ffee00" filter="url(#glow)"/>
    <!-- Mouth grill -->
    <rect x="-6" y="-57" width="4" height="5" rx="1" fill="#55cc66"/>
    <rect x="-1" y="-57" width="4" height="5" rx="1" fill="#55cc66"/>
    <rect x="4"  y="-57" width="4" height="5" rx="1" fill="#55cc66"/>
    <!-- Antenna -->
    <line x1="0" y1="-78" x2="0" y2="-94" stroke="#55cc66" stroke-width="3"/>
    <circle cx="0" cy="-98" r="6" fill="#99ffaa" filter="url(#glow)"/>
  </g>

  <!-- ===== DADDY ROBOT (red, facing left, hurt/recoiling) ===== -->
  <g transform="translate(568, 267)">
    <!-- Shadow -->
    <ellipse cx="0" cy="78" rx="34" ry="9" fill="#000" opacity="0.40"/>
    <!-- Back leg (right side for left-facing) -->
    <rect x="4"   y="13" width="18" height="42" rx="4" fill="#7a1100"/>
    <rect x="2"   y="54" width="22" height="13" rx="3" fill="#660e00"/>
    <!-- Forward leg (left side) -->
    <rect x="-21" y="13" width="18" height="42" rx="4" fill="#7a1100"/>
    <rect x="-23" y="54" width="22" height="13" rx="3" fill="#660e00"/>
    <!-- Body -->
    <rect x="-24" y="-45" width="48" height="84" rx="6" fill="#aa1111"/>
    <rect x="-20" y="-41" width="40" height="48" rx="4" fill="#cc2222"/>
    <!-- Reactor core (flickering — slightly dim) -->
    <circle cx="0" cy="4" r="11" fill="#ff6633" filter="url(#glow)"/>
    <circle cx="0" cy="4" r="5"  fill="#ffaaaa"/>
    <!-- Arms recoiling (both pulled back symmetrically) -->
    <rect x="-43" y="-29" width="22" height="14" rx="4" fill="#7a1100"/>
    <rect x="22"  y="-29" width="22" height="14" rx="4" fill="#7a1100"/>
    <!-- Head (rotated — dazed) -->
    <g transform="rotate(14)">
      <rect x="-21" y="-78" width="42" height="36" rx="6" fill="#aa1111"/>
      <rect x="-18" y="-75" width="36" height="30" rx="4" fill="#cc2222"/>
      <!-- Visor -->
      <rect x="-14" y="-71" width="28" height="13" rx="2" fill="rgba(0,0,0,0.65)"/>
      <!-- Dazed ×× eyes -->
      <text x="-10" y="-59" font-size="13" font-family="'Courier New', monospace" fill="#ffaaaa" font-weight="bold">×</text>
      <text x="3"   y="-59" font-size="13" font-family="'Courier New', monospace" fill="#ffaaaa" font-weight="bold">×</text>
      <!-- Antenna drooping from impact -->
      <line x1="0" y1="-78" x2="5" y2="-91" stroke="#ff4422" stroke-width="3"/>
      <circle cx="6" cy="-94" r="5" fill="#ff8844"/>
    </g>
    <!-- Mouth grill -->
    <rect x="-6" y="-57" width="4" height="5" rx="1" fill="#ff4422"/>
    <rect x="-1" y="-57" width="4" height="5" rx="1" fill="#ff4422"/>
    <rect x="4"  y="-57" width="4" height="5" rx="1" fill="#ff4422"/>
  </g>

  <!-- Round label -->
  <text x="400" y="56" font-size="9" font-family="'Courier New', monospace" fill="#aa66ff" text-anchor="middle" font-weight="bold">ROUND 2 OF 3</text>
  <text x="400" y="68" font-size="8" font-family="'Courier New', monospace" fill="#7755aa" text-anchor="middle">JULIEN LEADS  1–0</text>
</svg>
